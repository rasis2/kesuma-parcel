  <style>
    .phase-card { border-left:3px solid var(--accent); padding-left:20px; margin-bottom:28px; position:relative; }
    .phase-card::before { content:''; position:absolute; left:-8px; top:4px; width:13px; height:13px; border-radius:50%; background:var(--accent); border:2px solid var(--bg); }
    .phase-num { font-size:11px; font-weight:700; color:var(--accent); letter-spacing:2px; text-transform:uppercase; margin-bottom:6px; }
    .phase-title { font-family:var(--heading-font); font-size:17px; font-weight:800; margin-bottom:8px; letter-spacing:-0.3px; }
    .phase-cost { display:inline-flex; align-items:center; gap:6px; background:var(--accent-dim); border:1px solid rgba(var(--accent-rgb),0.2); color:var(--accent); font-family:'JetBrains Mono',monospace; font-size:12px; font-weight:600; padding:4px 12px; border-radius:100px; margin-bottom:10px; }
    .phase-items { list-style:none; }
    .phase-items li { font-size:13px; color:var(--text-soft); line-height:1.6; padding:4px 0; border-bottom:1px solid var(--border); display:flex; gap:8px; }
    .phase-items li:last-child { border-bottom:none; }
    .phase-items li::before { content:'→'; color:var(--accent); font-weight:700; flex-shrink:0; }
    .cost-table { width:100%; }
    .cost-table td { padding:8px 10px; font-size:13px; vertical-align:top; }
    .cost-table tr { border-bottom:1px solid var(--border); }
    .cost-table tr:last-child { border-bottom:none; }
    .cost-label { color:var(--text-muted); width:55%; }
    .cost-val { font-family:'JetBrains Mono',monospace; font-weight:600; color:var(--accent); text-align:right; }
    .note-box { background:var(--surface2); border:1px solid var(--border); border-radius:10px; padding:14px 16px; font-size:13px; color:var(--text-muted); line-height:1.7; }
    .tag { display:inline-block; padding:3px 10px; border-radius:100px; font-size:11px; font-weight:600; background:var(--green-dim); color:var(--green); border:1px solid rgba(76,175,125,0.2); margin:2px; }
  </style>
</head>
